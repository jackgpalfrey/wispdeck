name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out the tagged source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Validate release tag
        id: release
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tags must use the exact vMAJOR.MINOR.PATCH form." >&2
            exit 1
          fi

          if [[ "$(git cat-file -t "refs/tags/$TAG")" != "tag" ]]; then
            echo "Release tags must be annotated tags." >&2
            exit 1
          fi

          commit="$(git rev-list -n 1 "refs/tags/$TAG")"
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          if ! git merge-base --is-ancestor "$commit" refs/remotes/origin/main; then
            echo "The tagged commit must be reachable from main." >&2
            exit 1
          fi

          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "tag=$TAG"
            echo "commit=$commit"
            echo "built_at=$built_at"
          } >>"$GITHUB_OUTPUT"

      - name: Verify dependencies
        run: go mod verify

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race test
        run: go test -race ./...

      - name: Build release binaries
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.tag }}
          COMMIT: ${{ steps.release.outputs.commit }}
          BUILT_AT: ${{ steps.release.outputs.built_at }}
        run: |
          set -euo pipefail
          install -d -m 0755 dist

          ldflags="-s -w \
            -X github.com/wispdeck/wispdeck/internal/buildinfo.version=$VERSION \
            -X github.com/wispdeck/wispdeck/internal/buildinfo.commit=$COMMIT \
            -X github.com/wispdeck/wispdeck/internal/buildinfo.builtAt=$BUILT_AT"

          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            output="dist/wispdeck-$os-$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "$ldflags" -o "$output" ./cmd/wispdeck
          done

          chmod 0755 dist/wispdeck-linux-amd64 dist/wispdeck-linux-arm64
          (
            cd dist
            sha256sum wispdeck-linux-amd64 wispdeck-linux-arm64 >SHA256SUMS
          )

      - name: Verify release metadata
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.tag }}
          COMMIT: ${{ steps.release.outputs.commit }}
          BUILT_AT: ${{ steps.release.outputs.built_at }}
        run: |
          set -euo pipefail
          metadata="$(dist/wispdeck-linux-amd64 version --json)"
          jq -e \
            --arg version "$VERSION" \
            --arg commit "$COMMIT" \
            --arg built_at "$BUILT_AT" \
            '.version == $version and .commit == $commit and .builtAt == $built_at' \
            <<<"$metadata"
          (
            cd dist
            sha256sum --check SHA256SUMS
          )

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "A GitHub Release already exists for $TAG." >&2
            exit 1
          fi

          gh release create "$TAG" \
            dist/wispdeck-linux-amd64 \
            dist/wispdeck-linux-arm64 \
            dist/SHA256SUMS \
            --draft \
            --generate-notes \
            --title "Wispdeck $TAG" \
            --verify-tag

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --draft=false --latest
