{{define "recovery_codes.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>Recovery codes — Wispdeck</title>
  <script src="/assets/webauthn.js" defer></script>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">w</span>
        <span>Wispdeck</span>
      </a>
      <div class="auth-card on-card">
        <div>
          <h1>Save these recovery codes</h1>
          <p class="auth-sub">Previous codes are now invalid. Each new code works once and will not be shown again.</p>
        </div>
        <ol id="recovery-code-list" class="codes">
          {{range .Codes}}<li><code>{{.}}</code></li>{{end}}
        </ol>
        <button type="button" class="btn quiet" data-copy-codes>Copy codes</button>
      </div>
      <p class="auth-foot"><a href="/security/passkeys">I have saved them</a></p>
    </div>
  </main>
</body>
</html>{{end}}
