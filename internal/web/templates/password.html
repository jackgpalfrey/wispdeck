{{define "password.html"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change password — Wispdeck</title>
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
  <main class="panel">
    <h1>Change password</h1>
    <p class="subtle">Changing your password signs out every device, including this one.</p>
    {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}
    <form action="/security/password" method="post">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label for="current-password">Current password</label>
      <input id="current-password" name="current_password" type="password" autocomplete="current-password" required>
      <label for="new-password">New password</label>
      <input id="new-password" name="new_password" type="password" autocomplete="new-password" minlength="15" maxlength="1024" required>
      <label for="confirm-password">Confirm new password</label>
      <input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" minlength="15" maxlength="1024" required>
      <button type="submit">Change password and sign out</button>
    </form>
    <p><a href="/security/passkeys">Cancel</a></p>
  </main>
</body>
</html>{{end}}
