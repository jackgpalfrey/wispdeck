{{define "password.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>Change password — {{brand}}</title>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <a class="brand" href="/">
        {{template "brand_identity"}}
      </a>
      <div class="auth-card on-card">
        <div>
          <h1>Change password</h1>
          <p class="auth-sub">Changing your password signs out every device, including this one.</p>
        </div>
        {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}
        <form action="/security/password" method="post">
          <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
          <label class="field">Current password
            <input id="current-password" name="current_password" type="password" autocomplete="current-password" required>
          </label>
          <label class="field">New password
            <input id="new-password" name="new_password" type="password" autocomplete="new-password" minlength="15" maxlength="1024" required>
          </label>
          <label class="field">Confirm new password
            <input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" minlength="15" maxlength="1024" required>
          </label>
          <button type="submit" class="btn">Change password and sign out</button>
        </form>
      </div>
      <p class="auth-foot"><a href="/security/passkeys">Cancel</a></p>
    </div>
  </main>
</body>
</html>{{end}}
