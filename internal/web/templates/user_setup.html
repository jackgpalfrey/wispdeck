{{define "user_setup.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>Set up {{.Username}} — {{brand}}</title>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <span class="brand">
        {{template "brand_identity"}}
      </span>
      <div class="auth-card on-card">
        <div>
          <h1>Set up your account</h1>
          <p class="auth-sub">Choose the permanent password for <strong>{{.Username}}</strong>.</p>
        </div>
        {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}
        <form action="/setup" method="post">
          <input type="hidden" name="token" value="{{.Token}}">
          <label class="field">Password
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="15" maxlength="1024" required autofocus>
          </label>
          <label class="field">Confirm password
            <input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" minlength="15" maxlength="1024" required>
          </label>
          <button type="submit" class="btn">Set password</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>{{end}}
