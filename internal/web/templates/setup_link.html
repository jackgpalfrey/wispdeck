{{define "setup_link.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>Setup link replaced — Wispdeck</title>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">w</span>
        <span>Wispdeck</span>
      </a>
      <div class="auth-card on-card">
        <div>
          <h1>Setup link replaced</h1>
          <p class="auth-sub">The previous link is invalid. Give this new one-use link to the user:</p>
        </div>
        <input class="setup-secret" value="{{.SetupURL}}" readonly aria-label="Setup link">
      </div>
      <p class="auth-foot"><a href="/settings/users">Return to users</a></p>
    </div>
  </main>
</body>
</html>{{end}}
