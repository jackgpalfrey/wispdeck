{{define "login.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>Sign in — {{brand}}</title>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <a class="brand" href="/">
        {{template "brand_identity"}}
      </a>
      <div class="auth-card on-card">
        <div>
          <h1>Sign in</h1>
          <p class="auth-sub">{{tagline}}</p>
        </div>
        <form action="/login" method="post">
          <label class="field">Username
            <input id="username" name="username" value="{{.Username}}" autocomplete="username" required autofocus maxlength="64">
          </label>
          <label class="field">Password
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required maxlength="1024">
          </label>
          {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}
          <button type="submit" class="btn">Sign in</button>
        </form>
      </div>
      {{if landingEnabled}}<p class="auth-foot"><a href="/">← back to the front page</a></p>{{end}}
    </div>
  </main>
</body>
</html>{{end}}
