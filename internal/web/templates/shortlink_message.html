{{define "shortlink_message.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>{{.Title}} — Wispdeck</title>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true">w</span>
        <span>Wispdeck</span>
      </a>
      <div class="auth-card on-card">
        <div>
          <h1>{{.Title}}</h1>
          <p class="auth-sub">{{.Message}}</p>
        </div>
      </div>
      <p class="auth-foot"><a href="/">Return to Wispdeck</a></p>
    </div>
  </main>
</body>
</html>{{end}}
