{{define "management_message.html"}}<!doctype html>
<html lang="en" class="no-js">
<head>
  {{template "head_assets"}}
  <title>{{.Title}} — {{brand}}</title>
</head>
<body>
  <main class="auth-main">
    <div class="auth-box">
      <a class="brand" href="/">
        {{template "brand_identity"}}
      </a>
      <div class="auth-card on-card">
        <div>
          <h1>{{.Title}}</h1>
          <p class="auth-sub">{{.Message}}</p>
        </div>
      </div>
      <p class="auth-foot"><a href="/">Back to {{brand}}</a> · <a href="/settings/users">Users</a></p>
    </div>
  </main>
</body>
</html>{{end}}
